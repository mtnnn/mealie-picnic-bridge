services:
  mealie-picnic-bridge:
    build: .
    container_name: mealie-picnic-bridge
    ports:
      - "8080:8080"
    environment:
      - MEALIE_HOST=${MEALIE_HOST}
      - MEALIE_TOKEN=${MEALIE_TOKEN}
      - PICNIC_USERNAME=${PICNIC_USERNAME}
      - PICNIC_PASSWORD=${PICNIC_PASSWORD}
      - PICNIC_COUNTRY_CODE=${PICNIC_COUNTRY_CODE}
      - FUZZY_THRESHOLD=${FUZZY_THRESHOLD}
      - LLM_MATCHING_ENABLED=${LLM_MATCHING_ENABLED}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PICNIC_AUTH_TOKEN=${PICNIC_AUTH_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
