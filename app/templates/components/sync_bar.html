<div class="sync-bar">
    <div class="sync-info">
        <div class="list-name" id="listName">Shopping Lists</div>
        <div class="item-count" id="itemCount">Loading...</div>
    </div>
    <div class="sync-actions">
        <label class="checkbox-label">
            <input type="checkbox" id="skipCache"> Skip cache
        </label>
        <button class="delete-cache-btn" id="deleteCacheBtn" onclick="deleteCache()" title="Verwijder alle opgeslagen Picnic product-koppelingen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Delete cache
        </button>
        <button class="sync-btn" id="syncBtn" onclick="startSync()">
            <div class="spinner"></div>
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <span class="btn-label">Sync to Picnic</span>
        </button>
        <button class="stop-btn" id="stopBtn" onclick="stopSync()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <rect x="4" y="4" width="16" height="16" rx="2"/>
            </svg>
            Stop
        </button>
    </div>
</div>
