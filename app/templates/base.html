<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mealie Picnic Bridge</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span>mealie</span>
            <span class="dot">&times;</span>
            <span>picnic</span>
        </div>
        <div class="navbar-actions">
            <div class="navbar-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connected</span>
            </div>
            <button class="navbar-btn" id="authBtn" onclick="openAuthModal()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align: -2px;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <span class="btn-text">Auth</span>
            </button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    {% include "components/auth_modal.html" %}

    <script src="/static/js/app.js"></script>
</body>
</html>
