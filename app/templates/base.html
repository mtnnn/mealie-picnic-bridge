<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mealie Picnic Bridge</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ v }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span>mealie</span>
            <span class="dot">&times;</span>
            <span>picnic</span>
        </div>
        <div class="navbar-actions">
            <div class="navbar-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connected</span>
            </div>
            <a href="/" class="navbar-btn" style="text-decoration:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="btn-text">Sync</span>
            </a>
            <a href="/mapping" class="navbar-btn" style="text-decoration:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/><circle cx="12" cy="12" r="3"/></svg>
                <span class="btn-text">Mapping</span>
            </a>
            <a href="/audit" class="navbar-btn" style="text-decoration:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
                <span class="btn-text">Audit</span>
            </a>
            <button class="navbar-btn" id="authBtn" onclick="openAuthModal()" style="display:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align: -2px;">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <span class="btn-text">Auth</span>
            </button>
        </div>
    </nav>

    {% block content %}{% endblock %}

    {% include "components/auth_modal.html" %}

    <script src="/static/js/app.js?v={{ v }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
