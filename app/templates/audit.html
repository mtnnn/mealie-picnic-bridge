{% extends "base.html" %}
{% block content %}
<div class="main-container">

    <!-- Header bar -->
    <div class="sync-bar">
        <div class="sync-info">
            <div class="list-name">Recipe Photo Audit</div>
            <div class="item-count" id="auditSummary">Loading recipes…</div>
        </div>
        <div class="sync-actions">
            <button class="sync-btn" id="refreshBtn" onclick="loadRecipes()">
                <div class="spinner" id="refreshSpinner" style="display:none;"></div>
                <svg class="btn-icon" id="refreshIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
                </svg>
                <span class="btn-label">Refresh</span>
            </button>
        </div>
    </div>

    <!-- Prompt editor -->
    <div class="prompt-section prompt-section-standalone">
        <div class="prompt-section-header">
            <label class="prompt-section-label" for="promptTemplate">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                AI Prompt
            </label>
            <div class="prompt-placeholders">
                <span class="prompt-tag">{name}</span>
                <span class="prompt-tag">{description}</span>
                <span class="prompt-tag">{ingredients}</span>
            </div>
        </div>
        <textarea class="prompt-textarea" id="promptTemplate" rows="3" placeholder="Loading prompt template…"></textarea>
        <div class="prompt-section-footer">
            <button class="prompt-reset-btn" id="promptResetBtn" onclick="resetPromptTemplate()">Reset to default</button>
            <button class="prompt-save-btn" id="promptSaveBtn" onclick="savePromptTemplate()" disabled>Save changes</button>
        </div>
    </div>

    <!-- Filter tabs -->
    <div class="audit-filters" id="auditFilters" style="display:none;">
        <button class="filter-btn active" id="filterAll" onclick="filterRecipes('all')">All</button>
        <button class="filter-btn" id="filterMissing" onclick="filterRecipes('missing')">Missing Photo</button>
        <button class="filter-btn" id="filterHas" onclick="filterRecipes('has')">Has Photo</button>
    </div>

    <!-- Recipe grid -->
    <div id="recipeGrid" class="recipe-grid">
        <div class="empty-state"><p>Loading…</p></div>
    </div>

</div>

<!-- Photo modal -->
<div class="modal-overlay" id="photoModal" style="display:none;" onclick="handleModalClick(event)">
    <div class="modal photo-modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3 id="modalTitle">Find Photo</h3>
            <button class="modal-close" onclick="closePhotoModal()">&times;</button>
        </div>

        <div id="modalSearching" class="modal-searching">
            <div class="spinner-large"></div>
            <p>Searching for photos — this may take a moment…</p>
        </div>

        <div id="modalResults" style="display:none;">
            <div class="photo-candidates">

                <!-- DALL-E column -->
                <div class="photo-candidate">
                    <div class="candidate-label">AI Generated (DALL-E 3)</div>
                    <div class="candidate-image" id="dalleImg"></div>
                    <div class="candidate-error" id="dalleError"></div>
                    <div class="dalle-actions">
                        <button class="apply-btn" id="dalleApplyBtn" disabled onclick="applyPhoto('dalle')">Apply</button>
                        <button class="refresh-btn" id="dalleRefreshBtn" onclick="refreshPhotos()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
                            </svg>
                            Regenerate
                        </button>
                    </div>
                </div>

                <!-- Brave column -->
                <div class="photo-candidate">
                    <div class="candidate-label">Web Search (Brave)</div>
                    <div class="brave-grid" id="braveImgs"></div>
                    <div class="candidate-error" id="braveError"></div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/audit.js?v={{ v }}"></script>
{% endblock %}
